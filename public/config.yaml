pageTitle: 在线服务
titleTyping:
  - 在线服务
  - My Home Services
subtitle: 配置驱动的个人主页导航
siteIcon:
  favicon: favicon-smile.svg

layout:
  columns:
    desktop: 3
    tablet: 2
    mobile: 1

typewriter:
  typeSpeed: 100
  backSpeed: 60
  backDelay: 1800
  startDelay: 250
  loop: true
  cursorChar: "_"

timeline:
  - timestamp: "2026-04-10 13:45:32"
    content: |
      上线 **时间线** 首版
      支持 *多行文案*、`行内代码` 与 ~~删除线~~
  - timestamp: "2026-04-08 21:18:06"
    content: |
      页脚支持 **备案号** 与品牌信息配置
      继续保持纯静态部署能力
  - timestamp: "2026-04-05 09:02:44"
    content: |
      首页继续采用配置驱动模式
      导航按钮与时间线内容都可以直接在 YAML 中维护

