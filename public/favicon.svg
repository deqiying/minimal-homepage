<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="minimal-homepage favicon">
  <defs>
    <linearGradient id="bg" x1="6" y1="6" x2="58" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b1019" />
      <stop offset="0.55" stop-color="#121a28" />
      <stop offset="1" stop-color="#141c2a" />
    </linearGradient>
    <radialGradient id="halo" cx="33" cy="23" r="27" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#79c7ff" stop-opacity="0.42" />
      <stop offset="0.55" stop-color="#79c7ff" stop-opacity="0.14" />
      <stop offset="1" stop-color="#79c7ff" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="seven" x1="16" y1="18" x2="48" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9ff2ff" />
      <stop offset="0.45" stop-color="#79c7ff" />
      <stop offset="1" stop-color="#4f72ff" />
    </linearGradient>
    <linearGradient id="seven-shine" x1="22" y1="18" x2="40" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.9" />
      <stop offset="1" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
    <filter id="soft-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect x="4" y="4" width="56" height="56" rx="14" fill="url(#bg)" />
  <ellipse cx="33" cy="25" rx="22" ry="18" fill="url(#halo)" />

  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M13 33 C24 30 35 28 55 23" stroke="#0f2141" stroke-opacity="0.68" stroke-width="8" transform="translate(1 1)" />
    <path
      d="M33 15 C36 22 35 28 31 36 C28 42 28 47 31 51 C34 55 42 56 50 52"
      stroke="#0f2141"
      stroke-opacity="0.68"
      stroke-width="8"
      transform="translate(1 1)"
    />

    <g filter="url(#soft-glow)">
      <path d="M13 33 C24 30 35 28 55 23" stroke="url(#seven)" stroke-width="6.8" />
      <path d="M33 15 C36 22 35 28 31 36 C28 42 28 47 31 51 C34 55 42 56 50 52" stroke="url(#seven)" stroke-width="6.8" />
      <path d="M20 31 C28 29 36 27 48 24" stroke="url(#seven-shine)" stroke-width="2.2" />
      <path d="M34 18 C35 24 33 30 30 37" stroke="url(#seven-shine)" stroke-width="1.8" />
    </g>
  </g>
